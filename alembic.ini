# A generic, single database configuration.

[alembic]
# path to migration scripts.
# Use forward slashes (/) also on windows to provide an OS agnostic path
script_location = alembic

# The output encoding for migration scripts.
# Default: utf-8
output_encoding = utf-8

# The path to the Alembic migration environment.
# Default: .
# env.py is expected to be in the same directory as this file.
# If you want to use a different location, set this to the directory
# containing env.py.
# env_path = .

# The path to the Alembic migration template.
# Default: generic
# template = generic

# The path to the Alembic migration template for single database.
# Default: generic
# template_single = generic

# The path to the Alembic migration template for multiple databases.
# Default: generic
# template_multidb = generic

# The path to the Alembic migration template for async.
# Default: generic
# template_async = generic

# The path to the Alembic migration template for single database async.
# Default: generic
# template_single_async = generic

# The path to the Alembic migration template for multiple databases async.
# Default: generic
# template_multidb_async = generic

# The path to the Alembic migration template for single database with
# multiple heads.
# Default: generic
